name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run build

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 76a40ad2c8728384bdf1f2102b7237fd

      - name: Seed production database
        if: success()
        env:
          EMDASH_TOKEN: ${{ secrets.EMDASH_TOKEN }}
        run: npx emdash seed seed/seed.json --url https://huuloc.com --token "$EMDASH_TOKEN" --on-conflict skip
