<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<style>
		.mark {
			fill: none;
			stroke: #08090a;
			stroke-width: 2.25;
			stroke-linecap: round;
			stroke-linejoin: round;
		}
		.fill {
			fill: #08090a;
		}
		@media (prefers-color-scheme: dark) {
			.mark {
				stroke: #f7f8f8;
			}
			.fill {
				fill: #f7f8f8;
			}
		}
	</style>
	<!-- Stone basin: rim ellipse + curved bowl walls -->
	<ellipse cx="16" cy="10.5" rx="11" ry="2.75" class="mark" />
	<path d="M5 10.5 L5 14 C5 20.5 9.5 25 16 25 C22.5 25 27 20.5 27 14 L27 10.5" class="mark" />
	<!-- Liquid surface with a single ripple dot -->
	<ellipse cx="16" cy="10.5" rx="4.5" ry="1.1" class="fill" />
</svg>
