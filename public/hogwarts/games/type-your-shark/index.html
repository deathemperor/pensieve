<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Type Your Shark — Pensieve</title>
    <meta name="description" content="A typing game by Miriam Grigsby — hosted on Pensieve as a playable archive." />
    <script src="./vendor/jquery-3.1.0.min.js"></script>
    <script src="./jquery-ui-1.12.1/jquery-ui.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Cinzel&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="app.css" />
    <!-- Pensieve archive patches: run without the original Rails backend.
         Hides auth UI, stubs fetch to localhost:3000 so save/load calls fail
         silently, and unlocks the game surface at load. -->
    <style>
        /* Hide the Rails-backed auth chrome; stats modal stays so the player
           can review their locally-saved game history. */
        #auth-container,
        #blackout,
        #blackout2 { display: none !important; }
        /* Inside the stats modal, hide account-management buttons that have
           no meaning without a real user account. */
        #delete-user,
        #update-user,
        #update-user-info { display: none !important; }
        /* The "Your Stats" button is normally unlocked after login; here we
           always want it visible. */
        #myBtn { visibility: visible !important; }
        #easy-button,
        #medium-button,
        #hard-button { display: inline-block; }
        .pensieve-archive-banner {
            position: fixed; top: 8px; left: 8px; z-index: 9999;
            font: 500 11px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #aab1bd; background: rgba(8, 9, 10, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 10px; border-radius: 6px; backdrop-filter: blur(6px);
        }
        .pensieve-archive-banner a { color: #c8a464; text-decoration: none; }
        .pensieve-archive-banner a:hover { text-decoration: underline; }
    </style>
    <script>
        // Pensieve backend shim. The original game POSTs to a Rails API that
        // isn't part of the archive — so instead we route those requests to
        // a localStorage-backed router that mimics the response shapes the
        // game expects. Stats and game history persist across browser sessions
        // on the player's device.
        (function () {
            const realFetch = window.fetch.bind(window);
            const STORAGE_KEY = 'pensieve:type-your-shark:v1';
            const GUEST_USER_ID = 'guest';
            const GUEST_USERNAME = 'Guest';

            function readState() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return { games: [], nextId: 1 };
                    const parsed = JSON.parse(raw);
                    return { games: parsed.games || [], nextId: parsed.nextId || 1 };
                } catch {
                    return { games: [], nextId: 1 };
                }
            }
            function writeState(state) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            }
            function snapshotUser(state) {
                const games = state.games;
                const totalPoints = games.reduce((s, g) => s + (g.points || 0), 0);
                const totalSharks = games.reduce((s, g) => s + (g.sharks_killed || 0), 0);
                const counts = { easy: 0, medium: 0, hard: 0 };
                for (const g of games) if (counts[g.difficulty] !== undefined) counts[g.difficulty]++;
                const avgDifficulty =
                    games.length === 0
                        ? 'easy'
                        : Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
                return {
                    id: GUEST_USER_ID,
                    user_id: GUEST_USER_ID,
                    username: GUEST_USERNAME,
                    total_games: games.length,
                    total_sharks_killed: totalSharks,
                    total_points: totalPoints,
                    avg_difficulty: avgDifficulty,
                    games: games.slice(),
                };
            }
            function json(body, status) {
                return new Response(JSON.stringify(body), {
                    status: status || 200,
                    headers: { 'Content-Type': 'application/json' }
                });
            }

            window.fetch = function (input, init) {
                const url = typeof input === 'string' ? input : (input && input.url) || '';
                const method = (init && init.method) || (typeof input === 'object' && input.method) || 'GET';
                if (!/localhost:300[01]|127\.0\.0\.1/.test(url)) return realFetch(input, init);

                const path = url.replace(/^https?:\/\/[^/]+/, '');
                const state = readState();
                const user = snapshotUser(state);

                // POST /games — new game record
                if (method === 'POST' && path === '/games') {
                    let body = {};
                    try { body = init && init.body ? JSON.parse(init.body) : {}; } catch { }
                    const record = {
                        id: state.nextId,
                        points: body.points || 0,
                        sharks_killed: body.sharks_killed || 0,
                        difficulty: body.difficulty || 'easy',
                        user_id: GUEST_USER_ID,
                    };
                    state.games.push(record);
                    state.nextId += 1;
                    writeState(state);
                    return Promise.resolve(json(record));
                }

                // PATCH /games/:id — update in-flight game score
                const patchGame = method === 'PATCH' && path.match(/^\/games\/(\w+)/);
                if (patchGame) {
                    const id = Number(patchGame[1]);
                    let body = {};
                    try { body = init && init.body ? JSON.parse(init.body) : {}; } catch { }
                    const rec = state.games.find((g) => g.id === id);
                    if (rec) {
                        if (body.points !== undefined) rec.points = body.points;
                        if (body.sharks_killed !== undefined) rec.sharks_killed = body.sharks_killed;
                        writeState(state);
                    }
                    return Promise.resolve(json(rec || {}));
                }

                // DELETE /games/:id — remove a game from history
                const delGame = method === 'DELETE' && path.match(/^\/games\/(\w+)/);
                if (delGame) {
                    const id = Number(delGame[1]);
                    state.games = state.games.filter((g) => g.id !== id);
                    writeState(state);
                    return Promise.resolve(json({}));
                }

                // GET /users/:id — return the guest's aggregate + game list
                if (method === 'GET' && /^\/users\//.test(path)) {
                    return Promise.resolve(json(user));
                }

                // Auth endpoints — the forms are hidden, but keep these
                // responsive in case something triggers them.
                if (method === 'POST' && path === '/login') {
                    return Promise.resolve(json({ token: 'guest', user }));
                }
                if (method === 'POST' && path === '/users') {
                    return Promise.resolve(json({ token: 'guest', user }));
                }
                if (method === 'GET' && path === '/profile') {
                    return Promise.resolve(json(user));
                }
                if (method === 'DELETE' && /^\/users\//.test(path)) {
                    localStorage.removeItem(STORAGE_KEY);
                    return Promise.resolve(json({}));
                }
                if (method === 'PATCH' && /^\/users\//.test(path)) {
                    return Promise.resolve(json(user));
                }

                // Unknown — empty array so nothing crashes
                return Promise.resolve(json([]));
            };

            // Seed the auth-state the game reads at load so its unlock path runs.
            // The CSS also hides the auth chrome; this is belt-and-suspenders.
            const initialState = readState();
            const initialSnapshot = snapshotUser(initialState);
            localStorage.setItem('token', 'guest');
            localStorage.setItem('userId', GUEST_USER_ID);
            localStorage.setItem('user', GUEST_USERNAME);
            localStorage.setItem('userGames', String(initialSnapshot.total_games));
            localStorage.setItem('userSharks', String(initialSnapshot.total_sharks_killed));
            localStorage.setItem('userPoints', String(initialSnapshot.total_points));
            localStorage.setItem('userAvgDiff', initialSnapshot.avg_difficulty);
            localStorage.setItem('userGamesObj', JSON.stringify(initialSnapshot.games));
        })();
    </script>
</head>

<body>
<div class="pensieve-archive-banner">
    Archive — <a href="https://github.com/miriamgrigsby/type-your-shark-frontend" target="_blank" rel="noopener noreferrer">original by Miriam Grigsby</a>
    · <a href="/hogwarts/games/">← back</a>
</div>
<div id="top-container">
    <div id="title-container">
        <h1>Type-Your Shark</h1>
    </div>
    <div id="auth-container">
        <div id='tester'>
            <form id='auth-login' autocomplete="off">
                <input id="name" type='text' name='username' placeholder='username' />
                <input id="password" type='text' name='password' placeholder='password' />
                <input type='submit' id="loginSubmit-button" value="Login"
                    style="font-family: 'Cinzel', serif;
                font-size: large; background-image: url(https://media.gettyimages.com/vectors/gold-background-metal-texture-vector-id617749020?s=612x612); border-radius: 15%; box-shadow: 0 0 5px 2px rgb(53, 52, 52);">
                </>
            </form>
            <form id='auth-signup' autocomplete="off">
                <input id="name2" type='text' name='username' placeholder='username' />
                <input id="password2" type='text' name='password' placeholder='password' />
                <input type='submit' id="signupSubmit-button" value="Sign-Up"
                    style="font-family: 'Cinzel', serif;
                font-size: large; background-image: url(https://media.gettyimages.com/vectors/gold-background-metal-texture-vector-id617749020?s=612x612); border-radius: 15%; box-shadow: 0 0 5px 2px rgb(53, 52, 52);">
                </>
            </form>
            <div id="authButtons">
                <button id="login-button">Login</button>
                <button id="signup-button">Sign-Up</button>
            </div>
        </div>
    </div>
</div>

<div id="middle-container">
    <div id="stats-container">
        <h2 id="points">Points: <span id="underline1" style="text-decoration: underline;">0</span></h2>
        <h2 id="sharksKilled">Sharks Killed: <span id="underline2" style="text-decoration: underline;">0</span></h2>
        <h2 id="difLevel">Difficulty Level: <span id="underline4" style="text-decoration: underline;"></span></h2>
        <h2 id='timer'>Timer: <span id="underline3" style="text-decoration: underline;">0</span></h2>
    </div>
</div>
<div id="bottom-container">
    <div id="blackout"
        style="background-image:url(https://i.ya-webdesign.com/images/transparent-gray.png); display:block;">
    </div>
    <div id="blackout2"
        style="background-image:url(https://i.ya-webdesign.com/images/transparent-gray.png); display:block;">
    </div>
    <div id="left">
        <button id="easy-button">EASY</button>
        <button id="medium-button">MEDIUM</button>
        <button id="hard-button">HARD</button>
        <button id="myBtn" style="visibility: hidden;">Your Stats</button>
        <div id="myModal" class="modal">
            <div class="modal-content">
                <div id="show-stats">
                    <div id="overall-stats"></div>
                </div>
                <div id="model-buttons">
                    <button id="delete-user">Delete User</button>
                    <button id="update-user">Update User</button>
                    <form id='update-user-info' autocomplete="off">
                        <input id="new-username" type='text' name='username' placeholder='New Username' />
                        <input id="new-password" type='text' name='password' placeholder='New Password' />
                        <input type='submit' id="updateUserSubmit-button" value="Update"
                            style="font-family: 'Cinzel', serif;
                        font-size: large; background-image: url(https://media.gettyimages.com/vectors/gold-background-metal-texture-vector-id617749020?s=612x612); border-radius: 15%; box-shadow: 0 0 5px 2px rgb(53, 52, 52);">
                        </>
                    </form>
                </div>
                <span class="close">&times;</span>

                <div id="gamesTotal">
                    <div id="all-games"></div>
                </div>
            </div>
        </div>
    </div>
    <div id="game-container">
        <div id="moving-timer-box"></div>
        <div id="red-moving-timer-box"></div>
        <div id="speedWord"></div>
        <div id="treasure-pop-up">
            <h4>Santa Cruz Ruby +1000 </h4>
            <img src="resources/ruby.png" id="ruby-gem">
        </div>
        <img src="resources/closeTreasure.png" id="closedTreasure">
        <button id="start-button">START</button>
        <div id="popUp-container">
            <button id="next-level">Continue</button>
            <button id="exit">RESTART</button>
            <button id="view-stats">View Stats</button>
        </div>
        <div id="incoming-boss">INCOMING BOSS</div>
        <div id="popUpFail-container">
            <h2>GAME OVER</h2>
            <button id="view2-stats">View Stats</button>
            <button id="exit3">RESTART</button>
        </div>
        <div id="popUpStats-container">
            <h2 id='finalPoints'>Points:<span id="underline5" style="text-decoration: underline;">0lkajs</span></h2>
            <h2 id='totalSharksKilled'>Sharks Killed:<span id="underline6"
                    style="text-decoration: underline;">08ohub</span></h2>
            <button id="exit2">RESTART</button>
        </div>
        <img src="resources/diver.png" id="overlap">
    </div>
</div>
<script type="module" src='main.js'></script>
</body>

</html>
